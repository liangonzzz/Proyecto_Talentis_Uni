<div class="main-wrapper">

  <div class="page-header-wrap">
    <div class="page-header">
      <h1 class="page-title">Funcionarios</h1>
    </div>
  </div>

  <div class="funcionarios-content">

    <!-- Filtros -->
    <div class="filtros-card">
      <div class="filtro-group">
        <label class="filtro-label">Buscar Funcionario</label>
        <div class="search-wrap">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input class="search-input" id="buscar-input" type="text" placeholder="Buscar por palabra"/>
        </div>
      </div>
      <div class="filtro-group">
        <label class="filtro-label">Estado</label>
        <div class="select-wrap">
          <select class="filtro-select" id="filtro-estado">
            <option value="">Todos</option>
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
            <option value="Incapacidad">Incapacidad</option>
            <option value="Vacaciones">Vacaciones</option>
          </select>
          <svg class="select-arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M5 8l5 5 5-5"/></svg>
        </div>
      </div>
      <div class="filtro-group">
        <label class="filtro-label">Tipo de documento</label>
        <div class="select-wrap">
          <select class="filtro-select" id="filtro-tipo">
            <option value="">Todos</option>
            <option value="CC">CC</option>
            <option value="CE">CE</option>
            <option value="Pasaporte">Pasaporte</option>
          </select>
          <svg class="select-arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M5 8l5 5 5-5"/></svg>
        </div>
      </div>
    </div>

    <!-- Tabla -->
    <div class="tabla-card">
      <table class="func-tabla">
        <thead>
          <tr>
            <th>Nombre completo <span class="sort-icon">⇅</span></th>
            <th>Correo electrónico <span class="sort-icon">⇅</span></th>
            <th>Tipo <span class="sort-icon">⇅</span></th>
            <th>Documento <span class="sort-icon">⇅</span></th>
            <th>Hoja de vida <span class="sort-icon">⇅</span></th>
            <th>Estado <span class="sort-icon">⇅</span></th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="funcionarios-tbody"></tbody>
      </table>
    </div>

  </div>

  <!-- Dropdown estado inline -->
  <div class="estado-dropdown" id="estado-dropdown" style="display:none">
    <div class="estado-option" data-estado="Activo"><span class="estado-punto activo"></span>Activo</div>
    <div class="estado-option" data-estado="Inactivo"><span class="estado-punto inactivo"></span>Inactivo</div>
    <div class="estado-option" data-estado="Incapacidad"><span class="estado-punto incapacidad"></span>Incapacidad</div>
    <div class="estado-option" data-estado="Vacaciones"><span class="estado-punto vacaciones"></span>Vacaciones</div>
  </div>

</div>
